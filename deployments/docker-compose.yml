services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: knowflow-postgres
    environment:
      POSTGRES_DB: knowflow
      POSTGRES_USER: knowflow
      POSTGRES_PASSWORD: knowflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowflow -d knowflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - knowflow-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8.4
    container_name: knowflow-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - knowflow-redis:/data

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: knowflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.3.0
    container_name: knowflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - knowflow-grafana:/var/lib/grafana

volumes:
  knowflow-postgres:
  knowflow-redis:
  knowflow-grafana:
